worker_processes auto;

events {
    worker_connections 1024;
}

# ─────────────────────────────────────────────────────────────────────────
# Reverse-proxy HTTP minimal — serveur de TEST mono-machine.
# Pas de TLS / certbot / HSTS / CrowdSec (cf. nginx.conf pour la prod).
# Fusionne front (/) et back (/api) sur une seule origine http://<ip>:80,
# indispensable car le client est buildé avec VITE_REACT_APP_API_URL=/api
# (il appelle l'API en chemin relatif sur sa propre origine).
# ─────────────────────────────────────────────────────────────────────────
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    upstream backend {
        server abrpoint.server:8080;
    }

    upstream frontend {
        server abrpoint.client:80;
    }

    server {
        listen 80;
        server_name _;

        # FRONTEND (SPA)
        location / {
            proxy_pass http://frontend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API
        location /api/ {
            proxy_pass http://backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 50M;
        }

        # Fichiers uploadés servis statiquement (volume partagé avec le serveur).
        location /api/uploads/ {
            alias /app/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
