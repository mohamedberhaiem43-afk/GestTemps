server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Caching for static assets (JS, CSS, Images, Fonts) - Addresses Lighthouse 'long cache lifetime'
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # Main entry point (No-cache for HTML to ensure latest bundle is loaded)
    # $uri.html : sert les pages SEO statiques (ex. /logiciel-pointage →
    # logiciel-pointage.html déposé dans public/) en URL propre sans extension,
    # avant le fallback SPA index.html. N'affecte pas les routes React (pas de
    # fichier .html correspondant → tombe sur index.html comme avant).
    location / {
        try_files $uri $uri.html /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
    }
}
