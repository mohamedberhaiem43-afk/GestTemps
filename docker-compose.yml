volumes:
  # Renommé sqlserver-data → postgres-data lors de la migration SQL Server →
  # PostgreSQL. Sur un serveur qui avait l'ancien volume, l'ancien sqlserver-data
  # persiste (jamais supprimé automatiquement) — à nettoyer manuellement via
  # `docker volume rm <project>_sqlserver-data` après migration des données.
  #postgres-data:
  uploads_data:
  # Modèles de lettres/contrats édités via l'éditeur VaultTemplates (écrits dans
  # /app/VaultTemplates par TemplatesController). Sans ce volume nommé, les
  # modèles créés/modifiés à l'exécution vivaient sur le filesystem éphémère du
  # conteneur et étaient PERDUS à chaque recréation (docker compose down/up,
  # rebuild). Un volume *nommé* recopie les modèles seedés de l'image à sa
  # première création, puis conserve les modifications utilisateur.
  vault_templates_data:
  letsencrypt_data:
  qdrant_data:
  crowdsec_data:
  crowdsec_config:
  nginx_logs:
  # Cache du modèle d'embeddings e5-large (~2,2 Go), téléchargé au 1er démarrage de
  # rag-svc. Volume nommé → téléchargé UNE fois, conservé entre redémarrages/recréations.
  rag_models:

networks:
  app-network:

services:
  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/app/uploads:ro
      - letsencrypt_data:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      # Logs nginx exposés à CrowdSec via un volume nommé partagé — CrowdSec lit
      # /var/log/nginx pour détecter brute-force, scrapping, scan de vulnérabilités.
      - nginx_logs:/var/log/nginx
    depends_on:
      - abrpoint.server
      - abrpoint.client
    networks:
      - app-network

  # ─────────────────────────────────────────────────────────────────────────
  # CrowdSec — IDS / IPS communautaire, défense en profondeur RGPD Art. 32
  # « Dispositifs anti-malware et de détection d'intrusion ».
  # Lit les logs nginx pour détecter les patterns d'attaque (brute-force auth,
  # path traversal, scan de CVE, scrapping massif) ; pousse les IPs malveillantes
  # vers le bouncer nginx qui les bloque au niveau du reverse-proxy.
  # ─────────────────────────────────────────────────────────────────────────
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: abrpoint.crowdsec
    environment:
      # Collections à charger : nginx (brute-force, scan), http-cve (exploits
      # connus), base-http-scenarios (génériques OWASP top 10).
      COLLECTIONS: "crowdsecurity/nginx crowdsecurity/http-cve crowdsecurity/base-http-scenarios"
      # Empêche CrowdSec de partager nos données avec la community blocklist
      # API tant qu'on n'a pas validé contractuellement (RGPD : prudence,
      # CrowdSec lit déjà nos logs HTTP). Décommenter une fois la décision prise.
      DISABLE_ONLINE_API: "true"
    volumes:
      - crowdsec_data:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
      # Lecture seule sur les logs nginx — CrowdSec n'écrit jamais dedans.
      - nginx_logs:/var/log/nginx:ro
    restart: unless-stopped
    networks:
      - app-network

  certbot:
    # Bootstrap : si aucun cert n'existe pour concorde-work-force.com, le
    # premier `certbot renew` ne fait rien (rien à renouveler). Pour le tout
    # premier setup, lancer manuellement une fois :
    #   docker compose run --rm certbot certonly --webroot \
    #     -w /var/www/certbot -d concorde-work-force.com -d www.concorde-work-force.com \
    #     --email mohamedberhaiem43@gmail.com --agree-tos --non-interactive
    # Ensuite, ce service tourne en boucle et renouvelle automatiquement
    # tous les certs proches d'expiration (Let's Encrypt = 90 jours, renew
    # à 30j restants). Reload nginx après chaque renew réussi via deploy-hook.
    image: certbot/certbot
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c"
    command: 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --deploy-hook "touch /etc/letsencrypt/.renewed"; sleep 12h & wait $${!}; done;'
    restart: unless-stopped
    networks:
      - app-network

  abrpoint.database:
    # PostgreSQL 16 alpine : footprint ~80 Mo vs ~1.5 Go pour mssql.
    # POSTGRES_USER détermine le superuser créé au premier démarrage. Il faut
    # qu'il garde le rôle CREATEDB pour que ProvisioningService puisse créer
    # de nouvelles bases tenant — c'est par défaut le cas pour le superuser.
    image: postgres:16-alpine
    container_name: abrpoint.database
    environment:
      POSTGRES_USER: "abrpoint"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-}"
      # Crée automatiquement la "master" DB au premier démarrage. Les DB tenant
      # sont créées dynamiquement par ProvisioningService.
      POSTGRES_DB: "abrpoint_master"
      # Force fr_FR.UTF-8 pour rester aligné avec l'ancienne COLLATE French_CI_AS
      # (les LIKE/comparaisons sur libellés étaient case-insensitive sur SQL Server ;
      # à reverifier avec ICU collation côté Postgres au cas par cas).
      LANG: "fr_FR.utf8"
    volumes:
      - /var/lib/abrpoint/postgres:/var/lib/postgresql/data
      - ./postgres-backup:/var/lib/postgresql/backups
    ports:
      # Bound à 127.0.0.1 uniquement — JAMAIS exposé à l'extérieur du VPS.
      # Utilisé pour : dotnet ef migrations en local, psql diagnostic, pg_dump
      # depuis l'hôte. Sur le VPS, seul un user SSHé sur la machine peut s'y
      # connecter (le firewall UFW/iptables doit refuser 5432 en entrée).
      - "127.0.0.1:5432:5432"
    healthcheck:
      # pg_isready est inclus dans l'image postgres officielle, pas besoin
      # d'outil externe comme c'était le cas pour sqlcmd.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - app-network

  abrpoint.server:
    container_name: abrpoint.server
    image: mohamedbenrhaiem2003/abrpoint-server
    volumes:
      - uploads_data:/app/uploads
      # Persiste les modèles de contrat/lettres édités (cf. note sur le volume).
      - vault_templates_data:/app/VaultTemplates
    environment:
      # ── PostgreSQL connection (ex-SQL Server) ─────────────────────────
      # Format Npgsql : Host=...;Database=...;Username=...;Password=...
      # Plus de TrustServerCertificate (option SQL Server-spécifique).
      DB_HOST: "abrpoint.database"
      DB_NAME: "abrpoint_master"
      DB_USER: "abrpoint"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-}"
      ConnectionStrings__MasterConnection: "Host=abrpoint.database;Database=abrpoint_master;Username=abrpoint;Password=${POSTGRES_PASSWORD:-}"
      ConnectionStrings__TenantTemplate: "Host=abrpoint.database;Database={DbName};Username=abrpoint;Password=${POSTGRES_PASSWORD:-}"
      Hosting__RootDomain: "concorde-work-force.com"
      ASPNETCORE_URLS: "http://+:8080"
      DatabaseInitialization__Enabled: "true"
      DatabaseInitialization__SocieteCode: "01"
      DatabaseInitialization__SocieteName: "Default Company"
      DatabaseInitialization__SiteCode: "01"
      DatabaseInitialization__SiteName: "Main Site"
      DatabaseInitialization__AdminCode: "AD"
      DatabaseInitialization__AdminFirstName: "Admin"
      DatabaseInitialization__AdminLastName: "System"
      DatabaseInitialization__AdminEmail: "admin@abrpoint.local"
      DatabaseInitialization__AdminPassword: "123"
      DatabaseInitialization__ApplicationCode: "GRH"
      OpenRouter__ApiKey: "${OPENROUTER_API_KEY:-}"
      Rag__Enabled: "true"
      Rag__Sidecar__BaseUrl: "http://rag-svc:8080"
      Rag__Sidecar__ApiKey: "${RAG_SIDECAR_KEY:-}"
      Rag__Anthropic__ApiKey: "${ANTHROPIC_API_KEY:-}"
      Rag__Anthropic__OpenRouterModel: "google/gemini-2.0-flash-001"
      Smtp__Host: "${SMTP_HOST:-SMTP_HOST}"
      Smtp__Port: "${SMTP_PORT:-SMTP_PORT}"
      Smtp__Username: "${SMTP_USERNAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__FromName: "${SMTP_FROM_NAME:-Concorde Work Force}"
      Smtp__FromEmail: "${SMTP_FROM_EMAIL:-}"
      Smtp__EnableSsl: "true"
      Download__ApkUrl: "${APK_URL:-https://expo.dev/accounts/concorde-tech-innovation/projects/concorde-workly/builds/eaa49a17-4adf-4cb6-bc59-47c473547136}"
      Download__ApkVersion: "${APK_VERSION:-1.0.0}"
      Download__ApkSizeMb: "${APK_SIZE_MB:-}"
      Download__ApkPublishedAt: "${APK_PUBLISHED_AT:-2026-05-15}"
      Jwt__Key: "${JWT_SECRET:-}"
      Encryption__AesKey: "${AES_KEY:-}"
      Stripe__SecretKey: "${STRIPE_SECRET_KEY:-}"
      Stripe__WebhookSecret: "${STRIPE_WEBHOOK_SECRET:-}"
      Gemini__ApiKey: "${GEMINI_API_KEY:-}"
    depends_on:
      abrpoint.database:
        condition: service_healthy
      rag-svc:
        condition: service_healthy
    networks:
      - app-network
    expose:
      - "8080"

  abrpoint.client:
    container_name: abrpoint.client
    image: mohamedbenrhaiem2003/abrpoint-client:latest
    expose:
      - "80"
    depends_on:
      - abrpoint.server
    networks:
      - app-network

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: abrpoint.qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"
      - "6334"
    networks:
      - app-network

  rag-svc:
    container_name: abrpoint.rag-svc
    image: mohamedbenrhaiem2003/abrpoint-rag-svc:latest
    environment:
      QDRANT_URL: "http://qdrant:6333"
      EMBED_MODEL: "intfloat/multilingual-e5-large"
      EMBED_DEVICE: "cpu"
      SIDECAR_KEY: "${RAG_SIDECAR_KEY:-}"
      LOG_LEVEL: "INFO"
    depends_on:
      - qdrant
    expose:
      - "8080"
    volumes:
      # Cache du modèle e5-large : téléchargé au 1er démarrage, conservé ensuite.
      - rag_models:/models
    healthcheck:
      # Sain UNIQUEMENT quand le modèle e5-large est chargé en RAM : le handler /health
      # appelle get_embeddings(). On utilise python (curl absent de l'image slim).
      test: ["CMD", "python", "-c", "import urllib.request,json,sys; r=json.load(urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=30)); sys.exit(0 if r.get('model_loaded') else 1)"]
      interval: 30s
      timeout: 40s
      retries: 5
      # Large : couvre le téléchargement du modèle au 1er démarrage (~1-2 min) + le
      # chargement en RAM (~20 s). Pendant cette fenêtre, les échecs ne comptent pas.
      start_period: 300s
    networks:
      - app-network
