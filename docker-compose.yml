version: '3.8'

volumes:
  sqlserver-data:

networks:
  app-network:

services:
  app:
    image: mohamedbenrhaiem2003/abrpoint-app:latest
    container_name: abrpoint_app
  nginx-proxy:
    image: nginx:alpine
    ports:
    - "80:80"
    volumes:
    - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
    - abrpoint.server
    - abrpoint.client
    networks:
    - app-network


  abrpoint.database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: abrpoint.database
    environment:
      SA_PASSWORD: "PX0m6jCr1S8CsBjJZDrQXj66vILUAOpvtYeqjr8aT4A="
      ACCEPT_EULA: "Y"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./sql-backup:/var/opt/sql-backup
    networks:
      - app-network



  abrpoint.server:
    container_name: abrpoint.server
    image: mohamedbenrhaiem2003/abrpoint-server:latest
    environment:
      DB_HOST: "abrpoint.database"
      DB_NAME: "ABRPOINT"
      DB_USER: "sa"
      DB_PASSWORD: "PX0m6jCr1S8CsBjJZDrQXj66vILUAOpvtYeqjr8aT4A="
      ASPNETCORE_URLS: "http://+:8080"
    depends_on:
      - abrpoint.database
        # condition: service_healthy
    networks:
      - app-network
    expose:
      - "8080"

  abrpoint.client:
    container_name: abrpoint.client
    image: mohamedbenrhaiem2003/abrpoint-client:latest
      # args:
        # Client makes requests to /api which nginx will proxy
        # VITE_REACT_APP_API_URL: /api
    depends_on:
      - abrpoint.server
    networks:
      - app-network