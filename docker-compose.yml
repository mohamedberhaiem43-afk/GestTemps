volumes:
  sqlserver-data:
  uploads_data:
  letsencrypt_data:  # certificat SSL partagé nginx ⇄ certbot
  qdrant_data:       # index vectoriel persistant (RAG)

networks:
  app-network:

services:
  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/app/uploads:ro
      - letsencrypt_data:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - abrpoint.server
      - abrpoint.client
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot -d concorde-work-force.com --email mohamedberhaiem43@gmail.com --agree-tos --non-interactive

  abrpoint.database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: abrpoint.database
    environment:
      SA_PASSWORD: "PX0m6jCr1S8CsBjJZDrQXj66vILUAOpvtYeqjr8aT4A="
      ACCEPT_EULA: "Y"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./sql-backup:/var/opt/sql-backup
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - app-network

  abrpoint.server:
    container_name: abrpoint.server
    build:
      context: .
      dockerfile: Dockerfile.server
    image: abrpoint-server:local
    volumes:
      - uploads_data:/app/uploads
    environment:
      DB_HOST: "abrpoint.database"
      DB_NAME: "ABRPOINT"
      DB_USER: "sa"
      DB_PASSWORD: "PX0m6jCr1S8CsBjJZDrQXj66vILUAOpvtYeqjr8aT4A="
      ConnectionStrings__MasterConnection: "Server=abrpoint.database;Database=ABRPOINT_master;User Id=sa;Password=PX0m6jCr1S8CsBjJZDrQXj66vILUAOpvtYeqjr8aT4A=;TrustServerCertificate=True;"
      ConnectionStrings__TenantTemplate: "Server=abrpoint.database;Database={DbName};User Id=sa;Password=PX0m6jCr1S8CsBjJZDrQXj66vILUAOpvtYeqjr8aT4A=;TrustServerCertificate=True;"
      Hosting__RootDomain: "concorde-work-force.com"
      ASPNETCORE_URLS: "http://+:8080"
      DatabaseInitialization__Enabled: "true"
      DatabaseInitialization__SocieteCode: "01"
      DatabaseInitialization__SocieteName: "Default Company"
      DatabaseInitialization__SiteCode: "01"
      DatabaseInitialization__SiteName: "Main Site"
      DatabaseInitialization__AdminCode: "AD"
      DatabaseInitialization__AdminFirstName: "Admin"
      DatabaseInitialization__AdminLastName: "System"
      DatabaseInitialization__AdminEmail: "admin@abrpoint.local"
      DatabaseInitialization__AdminPassword: "123"
      DatabaseInitialization__ApplicationCode: "GRH"
      # ── RAG ACTIVÉ ────────────────────────────────────────────────────
      # OpenRouter (clé déjà dans appsettings.json) → modèle Llama 3.3 gratuit.
      # Pour basculer sur Anthropic direct, mettez Rag__Anthropic__UseOpenRouter à "false"
      # et fournissez ANTHROPIC_API_KEY dans un fichier .env à côté du compose.
      Rag__Enabled: "true"
      Rag__Sidecar__BaseUrl: "http://rag-svc:8080"
      Rag__Sidecar__ApiKey: "${RAG_SIDECAR_KEY:-}"
      Rag__Anthropic__ApiKey: "${ANTHROPIC_API_KEY:-}"
      # Modèle LLM via OpenRouter (clé déjà dans appsettings). Gemini 2.0 Flash est
      # stable et très bon marché. Les modèles `:free` (llama-3.3, etc.) sont
      # régulièrement rate-limited 429 en amont — éviter en prod.
      Rag__Anthropic__OpenRouterModel: "google/gemini-2.0-flash-001"
      # ── SMTP (OVH ssl0.ovh.net) ───────────────────────────────────────
      # Sans ces variables, les emails de réinit. mot de passe, validations
      # de demandes, etc. échouent silencieusement (le contrôleur logge mais
      # renvoie 200 par anti-énumération). Renseigner via fichier .env :
      #   SMTP_HOST=ssl0.ovh.net
      #   SMTP_PORT=587
      #   SMTP_USERNAME=contact@concorde-tech.fr
      #   SMTP_PASSWORD=...
      #   SMTP_FROM_EMAIL=contact@concorde-tech.fr  (DOIT = SMTP_USERNAME sur OVH)
      #   SMTP_FROM_NAME=Concorde Work Force
      Smtp__Host: "${SMTP_HOST:-ssl0.ovh.net}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__Username: "${SMTP_USERNAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__FromName: "${SMTP_FROM_NAME:-Concorde Work Force}"
      Smtp__FromEmail: "${SMTP_FROM_EMAIL:-}"
      Smtp__EnableSsl: "true"
    depends_on:
      abrpoint.database:
        condition: service_healthy
      rag-svc:
        condition: service_started
    networks:
      - app-network
    expose:
      - "8080"

  abrpoint.client:
    container_name: abrpoint.client
    image: mohamedbenrhaiem2003/abrpoint-client:latest
    expose:
      - "80"
    depends_on:
      - abrpoint.server
    networks:
      - app-network

  # ──────────────────────────────────────────────────────────────────────
  # RAG : vector store + sidecar Python (LangChain + multilingual-e5-large)
  # Le backend .NET parle au sidecar via http://rag-svc:8080 (réseau interne).
  # Aucune exposition publique — toujours derrière nginx-proxy si besoin.
  # ──────────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: abrpoint.qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"
      - "6334"
    networks:
      - app-network

  rag-svc:
    container_name: abrpoint.rag-svc
    build:
      context: ./services/rag
      dockerfile: Dockerfile
    image: abrpoint-rag-svc:local
    environment:
      QDRANT_URL: "http://qdrant:6333"
      EMBED_MODEL: "intfloat/multilingual-e5-large"
      EMBED_DEVICE: "cpu"
      SIDECAR_KEY: "${RAG_SIDECAR_KEY:-}"
      LOG_LEVEL: "INFO"
    depends_on:
      - qdrant
    expose:
      - "8080"
    networks:
      - app-network
