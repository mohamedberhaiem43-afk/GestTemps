name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Server Image
        run: |
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/abrpoint-server:latest -f Dockerfile.server .
          docker push ${{ secrets.DOCKER_USERNAME }}/abrpoint-server:latest

      - name: Build and Push Client Image
        run: |
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/abrpoint-client:latest -f Dockerfile.client .
          docker push ${{ secrets.DOCKER_USERNAME }}/abrpoint-client:latest

      - name: Build and Push RAG Image
        run: |
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/abrpoint-rag-svc:latest ./services/rag
          docker push ${{ secrets.DOCKER_USERNAME }}/abrpoint-rag-svc:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
  
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
  
      - name: Test SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key_path: ~/.ssh/deploy_key
          debug: true
          script: |
            whoami
            hostname
  
      - name: Copy compose and nginx files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key_path: ~/.ssh/deploy_key
          source: "docker-compose.yml,nginx.conf"
          target: "/home/ubuntu/"
  
      - name: Write .env on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AES_KEY: ${{ secrets.AES_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key_path: ~/.ssh/deploy_key
          script: |
            umask 077
  
            cat > /home/ubuntu/.env <<EOF
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            AES_KEY=${AES_KEY}
            EOF
  
            chmod 600 /home/ubuntu/.env
  
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key_path: ~/.ssh/deploy_key
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/abrpoint-server:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/abrpoint-client:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/abrpoint-rag-svc:latest
  
            docker compose \
              --env-file /home/ubuntu/.env \
              -f /home/ubuntu/docker-compose.yml \
              down
  
            docker compose \
              --env-file /home/ubuntu/.env \
              -f /home/ubuntu/docker-compose.yml \
              up -d --force-recreate
  
            docker image prune -f
