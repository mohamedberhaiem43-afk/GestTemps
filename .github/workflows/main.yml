name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Server Image
        run: |
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/abrpoint-server:latest -f Dockerfile.server .
          docker push ${{ secrets.DOCKER_USERNAME }}/abrpoint-server:latest

      - name: Build and Push Client Image
        run: |
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/abrpoint-client:latest -f Dockerfile.client .
          docker push ${{ secrets.DOCKER_USERNAME }}/abrpoint-client:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Copy compose file
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "docker-compose.yml"
        target: "/home/ubuntu/"
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/abrpoint-server:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/abrpoint-client:latest
          docker compose -f /home/ubuntu/docker-compose.yml down
          docker compose -f /home/ubuntu/docker-compose.yml up -d
