name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Pre-pull MCR base images with retry to absorb transient 403s from
      # mcr.microsoft.com on GitHub-hosted runners (shared egress IPs are
      # occasionally throttled). Once cached locally, the subsequent docker
      # build resolves them without re-fetching the manifest.
      - name: Warm MCR base images
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 5
          retry_wait_seconds: 30
          command: |
            docker pull mcr.microsoft.com/dotnet/sdk:8.0
            docker pull mcr.microsoft.com/dotnet/aspnet:8.0

      - name: Build and Push Server Image
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            docker build -t ${{ secrets.DOCKER_USERNAME }}/abrpoint-server:latest -f Dockerfile.server .
            docker push ${{ secrets.DOCKER_USERNAME }}/abrpoint-server:latest

      - name: Build and Push Client Image
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            docker build -t ${{ secrets.DOCKER_USERNAME }}/abrpoint-client:latest -f Dockerfile.client .
            docker push ${{ secrets.DOCKER_USERNAME }}/abrpoint-client:latest

      - name: Build and Push RAG Image
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            docker build -t ${{ secrets.DOCKER_USERNAME }}/abrpoint-rag-svc:latest ./services/rag
            docker push ${{ secrets.DOCKER_USERNAME }}/abrpoint-rag-svc:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
  
      - name: Test SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key_path: ~/.ssh/deploy_key
          debug: true
          script: |
            whoami
            hostname
  
      - name: Copy compose and nginx files
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key_path: ~/.ssh/deploy_key
          source: "docker-compose.yml,nginx.conf"
          target: "/home/ubuntu/"
  
      - name: Write .env on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AES_KEY: ${{ secrets.AES_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key_path: ~/.ssh/deploy_key
          script: |
            umask 077
  
            cat > /home/ubuntu/.env <<EOF
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            AES_KEY=${AES_KEY}
            EOF
  
            chmod 600 /home/ubuntu/.env
  
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key_path: ~/.ssh/deploy_key
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/abrpoint-server:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/abrpoint-client:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/abrpoint-rag-svc:latest
  
            docker compose \
              --env-file /home/ubuntu/.env \
              -f /home/ubuntu/docker-compose.yml \
              down
  
            docker compose \
              --env-file /home/ubuntu/.env \
              -f /home/ubuntu/docker-compose.yml \
              up -d --force-recreate
  
            docker image prune -f
