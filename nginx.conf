worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    client_body_timeout 60s;
    client_header_timeout 10s;
    send_timeout 60s;

    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    map $http_origin $cors_origin {
        default "";
        "https://concorde-work-force.com" $http_origin;
        "http://localhost:3000" $http_origin;
        "http://localhost:8081" $http_origin;
        "http://localhost:19006" $http_origin;
        "~^exp://.*" $http_origin;
    }

    # SEO — Indexation sélective (approche B).
    # Par défaut tout le domaine reste « noindex, nofollow » (appli SaaS privée).
    # Seules les pages marketing PUBLIQUES sont indexables : on mappe leur URI vers
    # une valeur VIDE — nginx n'ajoute alors PAS l'en-tête X-Robots-Tag, ce qui
    # autorise l'indexation. Tout le reste (login, signup, /dashboard/*, assets)
    # garde le noindex. Ajouter ici toute nouvelle page publique à référencer.
    map $uri $robots_tag {
        default              "noindex, nofollow";
        "/"                  "";
        "/download"          "";
        "/contact-sales"     "";
        "/suppression-compte" "";
        # Politique de confidentialité (page HTML servie depuis public/) — exigée
        # publiquement indexable par Google Play (URL de la privacy policy).
        "/politique-confidentialite" "";
        # Versions anglaises indexables (pages bilingues).
        "/en"                "";
        "/en/suppression-compte" "";
        "/en/download"       "";
        "/en/contact-sales"  "";
        # Pages SEO statiques (servies depuis public/ par le conteneur front).
        # Doivent rester indexables, sinon le reverse-proxy leur colle « noindex ».
        "/logiciel-pointage" "";
        "/logiciel-gestion-conges-absences" "";
        "/logiciel-gestion-du-personnel" "";
        # Assets SEO publics : Google REFUSE d'utiliser un favicon ou une image
        # sociale portant « noindex ». Sans ces lignes, la SERP affiche le globe
        # générique au lieu du logo Concorde Workly. Doivent rester indexables.
        "/concorde-workly-light.jpg" "";
        "/og-image.jpg"      "";
    }

    upstream backend {
        server abrpoint.server:8080;
    }

    upstream frontend {
        server abrpoint.client:80;
    }

    upstream ghost {
        server ghost:2368;
    }

    # ----------------------------
    # HTTP (CERTBOT SAFE)
    # ----------------------------
    server {
        listen 80;
        server_name concorde-work-force.com www.concorde-work-force.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://concorde-work-force.com$request_uri;
        }
    }

    # ----------------------------
    # HTTP — BLOG (CERTBOT SAFE)
    # ----------------------------
    server {
        listen 80;
        server_name blog.concorde-work-force.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://blog.concorde-work-force.com$request_uri;
        }
    }

    # ----------------------------
    # HTTPS MAIN DOMAIN
    # ----------------------------
    server {
        listen 443 ssl http2;
        server_name concorde-work-force.com;

        ssl_certificate /etc/letsencrypt/live/concorde-work-force.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/concorde-work-force.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://restcountries.com https://calendrier.api.gouv.fr https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com; frame-src 'self' blob:; base-uri 'self'; form-action 'self';" always;

        # Indexation sélective : noindex par défaut, vide (= indexable) sur les pages
        # publiques (cf. map $robots_tag). add_header avec valeur vide n'émet rien.
        add_header X-Robots-Tag $robots_tag always;

        # 2026-06-05 : page /about supprimée → 301 permanent vers l'accueil.
        # Préserve le jus SEO de l'URL déjà indexée par Google (évite un bounce
        # vers /login). À retirer une fois Google ayant recrawlé.
        location = /about {
            return 301 https://concorde-work-force.com/$is_args$args;
        }

        # FRONTEND
        location / {
            proxy_pass http://frontend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API
        location /api/ {
            proxy_pass http://backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 50M;

            limit_req zone=api_limit burst=20 nodelay;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ⚠ SÉCURITÉ — NE PAS servir /api/uploads/ en statique.
        # Auparavant un bloc `location /api/uploads/ { alias /app/uploads/; }` court-circuitait
        # le backend : il servait les fichiers (bulletins de paie, contrats…) directement depuis
        # le volume, SANS [Authorize], SANS anti path-traversal et SANS isolation tenant — toute
        # personne détenant l'URL (fuite, ex-employé, autre tenant) téléchargeait le document.
        # Ces requêtes doivent retomber sur `location /api/` ci-dessus → proxy → UploadsController,
        # qui applique l'authentification, le contrôle d'accès et le filtrage du chemin.
    }

    # ----------------------------
    # WWW → NON-WWW (HTTPS)
    # ----------------------------
    server {
        listen 443 ssl http2;
        server_name www.concorde-work-force.com;

        ssl_certificate /etc/letsencrypt/live/concorde-work-force.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/concorde-work-force.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        return 301 https://concorde-work-force.com$request_uri;
    }

    # ----------------------------
    # HTTPS — BLOG GHOST (blog.concorde-work-force.com)
    # ----------------------------
    # ✅ BLOC ACTIF EN PERMANENCE — plus besoin de le commenter/décommenter.
    # Le service `init-certs` (docker-compose.app.yml) pose un certificat auto-signé
    # TEMPORAIRE pour ce sous-domaine AVANT le démarrage de nginx, donc nginx ne
    # crashe jamais même quand le vrai cert n'existe pas encore. Le vrai certificat
    # Let's Encrypt est ensuite émis par scripts/init-letsencrypt.sh (1 fois), qui
    # remplace le faux et recharge nginx. Renouvellement auto via le service certbot.
    server {
        listen 443 ssl http2;
        server_name blog.concorde-work-force.com;

        ssl_certificate /etc/letsencrypt/live/blog.concorde-work-force.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/blog.concorde-work-force.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Blog public destiné au SEO : volontairement PAS de X-Robots-Tag noindex
        # ni de CSP stricte « default-src 'self' » (casserait l'admin Ghost et les
        # thèmes). Ghost gère ses propres en-têtes de sécurité.

        # Uploads d'images / imports depuis l'admin Ghost.
        client_max_body_size 50M;

        location / {
            proxy_pass http://ghost;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Indispensable : sans ça Ghost génère des URLs http:// et boucle en redirection.
            proxy_set_header X-Forwarded-Proto $scheme;

            # Support WebSocket (prévisualisation / admin temps réel).
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}