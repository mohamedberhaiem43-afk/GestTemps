worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Body timeout doit couvrir l'upload d'un scan 50 Mo sur mobile lent.
    # Header timeout reste court (10s) car les en-têtes sont petits — utile contre slowloris.
    client_body_timeout 60s;
    client_header_timeout 10s;
    send_timeout 60s;

    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # CORS origins autorisées
    map $http_origin $cors_origin {
        default "";

        "https://concorde-work-force.com" $http_origin;
        "http://localhost:3000" $http_origin;
        "http://localhost:8081" $http_origin;
        "http://localhost:19006" $http_origin;

        "~^exp://.*" $http_origin;
    }

    upstream backend {
        server abrpoint.server:8080;
    }

    upstream frontend {
        server abrpoint.client:80;
    }

    # HTTP → HTTPS
    server {
        listen 80;
        server_name concorde-work-force.com www.concorde-work-force.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        return 301 https://concorde-work-force.com$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name concorde-work-force.com;

        ssl_certificate /etc/letsencrypt/live/concorde-work-force.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/concorde-work-force.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        ssl_stapling on;
        ssl_stapling_verify on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Origin-Agent-Cluster "?1" always;

        # CSP doit tenir sur UNE seule ligne — un header HTTP ne peut pas contenir de LF.
        # 'unsafe-inline' sur script-src est nécessaire car Vite injecte un petit
        # bootstrap inline dans index.html. À durcir plus tard via nonce/hash.
        #
        # frame-src 'self' blob: → autorise les <iframe src="blob:..."> utilisées pour
        # prévisualiser les PDF générés (preview template, aperçu contrat, état global).
        # Sans cette directive, l'app retombe sur default-src 'self' (le navigateur loggue
        # « Framing 'blob:...' violates default-src ») et l'aperçu s'affiche vide.
        # connect-src ajoute restcountries.com : référentiel public utilisé par
        # CountrySelect (EmployeModern, PaysModern) pour récupérer libellés FR +
        # codes ISO + URL drapeau. Pas d'alternative locale équivalente (la table
        # nation n'embarque pas les drapeaux ni les traductions). Les drapeaux
        # eux-mêmes sont servis depuis flagcdn.com en HTTPS — couvert par
        # img-src https: ci-dessus.
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://concorde-work-force.com https://restcountries.com; frame-src 'self' blob:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        add_header X-Robots-Tag "noindex, nofollow" always;

        # FRONTEND
        location / {
            proxy_pass http://frontend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # Health checks
        location = /healthz {
            proxy_pass http://backend;
            access_log off;
        }

        location = /readyz {
            proxy_pass http://backend;
            access_log off;
        }

        # Bloquer extensions dangereuses upload
        location ~* ^/api/uploads/.*\.(php|phtml|js|exe|bat|sh)$ {
            deny all;
        }

        # Uploads statiques
        location /api/uploads/ {
            alias /app/uploads/;

            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin $cors_origin always;
        }

        # API
        location /api/ {
            proxy_pass http://backend;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            client_max_body_size 50M;

            limit_req zone=api_limit burst=20 nodelay;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }
    }

    # HTTPS www → non-www
    server {
        listen 443 ssl http2;
        server_name www.concorde-work-force.com;

        ssl_certificate /etc/letsencrypt/live/concorde-work-force.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/concorde-work-force.com/privkey.pem;

        return 301 https://concorde-work-force.com$request_uri;
    }
}