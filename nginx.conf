worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    client_body_timeout 60s;
    client_header_timeout 10s;
    send_timeout 60s;

    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    map $http_origin $cors_origin {
        default "";
        "https://concorde-work-force.com" $http_origin;
        "http://localhost:3000" $http_origin;
        "http://localhost:8081" $http_origin;
        "http://localhost:19006" $http_origin;
        "~^exp://.*" $http_origin;
    }

    # SEO — Indexation sélective (approche B).
    # Par défaut tout le domaine reste « noindex, nofollow » (appli SaaS privée).
    # Seules les pages marketing PUBLIQUES sont indexables : on mappe leur URI vers
    # une valeur VIDE — nginx n'ajoute alors PAS l'en-tête X-Robots-Tag, ce qui
    # autorise l'indexation. Tout le reste (login, signup, /dashboard/*, assets)
    # garde le noindex. Ajouter ici toute nouvelle page publique à référencer.
    map $uri $robots_tag {
        default              "noindex, nofollow";
        "/"                  "";
        "/about"             "";
        "/download"          "";
        "/contact-sales"     "";
        "/suppression-compte" "";
    }

    upstream backend {
        server abrpoint.server:8080;
    }

    upstream frontend {
        server abrpoint.client:80;
    }

    # ----------------------------
    # HTTP (CERTBOT SAFE)
    # ----------------------------
    server {
        listen 80;
        server_name concorde-work-force.com www.concorde-work-force.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://concorde-work-force.com$request_uri;
        }
    }

    # ----------------------------
    # HTTPS MAIN DOMAIN
    # ----------------------------
    server {
        listen 443 ssl http2;
        server_name concorde-work-force.com;

        ssl_certificate /etc/letsencrypt/live/concorde-work-force.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/concorde-work-force.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://restcountries.com https://calendrier.api.gouv.fr https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com; frame-src 'self' blob:; base-uri 'self'; form-action 'self';" always;

        # Indexation sélective : noindex par défaut, vide (= indexable) sur les pages
        # publiques (cf. map $robots_tag). add_header avec valeur vide n'émet rien.
        add_header X-Robots-Tag $robots_tag always;

        # FRONTEND
        location / {
            proxy_pass http://frontend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API
        location /api/ {
            proxy_pass http://backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 50M;

            limit_req zone=api_limit burst=20 nodelay;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        location /api/uploads/ {
            alias /app/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ----------------------------
    # WWW → NON-WWW (HTTPS)
    # ----------------------------
    server {
        listen 443 ssl http2;
        server_name www.concorde-work-force.com;

        ssl_certificate /etc/letsencrypt/live/concorde-work-force.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/concorde-work-force.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        return 301 https://concorde-work-force.com$request_uri;
    }
}