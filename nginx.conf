worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    upstream backend {
        server abrpoint.server:8080;
    }

    upstream frontend {
        server abrpoint.client:80;
    }

    # Redirection HTTP → HTTPS
    server {
        listen 80;
        server_name concorde-work-force.com www.concorde-work-force.com;

        # Challenge Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name concorde-work-force.com www.concorde-work-force.com;

        ssl_certificate /etc/letsencrypt/live/concorde-work-force.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/concorde-work-force.com/privkey.pem;

        location / {
            proxy_pass http://frontend;
        }

        location /api/uploads/ {
            alias /app/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin *;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
        }
    }
}