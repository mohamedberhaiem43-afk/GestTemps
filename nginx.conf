worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    upstream backend {
        server abrpoint.server:8080;
    }

    upstream frontend {
        server abrpoint.client:80;
    }

    # Redirection www HTTP → HTTPS sans www
server {
    listen 80;
    server_name www.concorde-work-force.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://concorde-work-force.com$request_uri;
    }
}

    # HTTP → HTTPS + challenge certbot
    server {
        listen 80;
        server_name concorde-work-force.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://concorde-work-force.com$request_uri;
        }
    }

    # HTTPS principal
    server {
        listen 443 ssl;
        server_name concorde-work-force.com;

        ssl_certificate /etc/letsencrypt/live/concorde-work-force.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/concorde-work-force.com/privkey.pem;

        # Forcer TLS moderne uniquement (SSLv3/TLS1.0/TLS1.1 sont cassés ; le défaut nginx
        # historique les inclut encore). TLSv1.2 garde la compat avec les vieux navigateurs
        # tout en laissant TLSv1.3 négocier quand possible.
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # SEC — Headers de sécurité au niveau edge.
        # `add_header always` garantit l'envoi même sur les réponses d'erreur 4xx/5xx
        # (sinon nginx ne les ajoute que sur les 200/204/301/302/303/307/308).
        # HSTS 1 an + includeSubDomains + preload : empêche le downgrade HTTPS→HTTP
        # sur les sous-domaines tenants (xxx.concorde-work-force.com).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;
        add_header X-Robots-Tag "noindex, nofollow" always; # à retirer le jour où on veut être indexé

        location / {
            proxy_pass http://frontend;
        }

        # Health endpoints exposés sans auth pour monitoring externe (UptimeRobot, k8s).
        location = /healthz { proxy_pass http://backend; access_log off; }
        location = /readyz  { proxy_pass http://backend; access_log off; }

        location /api/uploads/ {
            alias /app/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin *;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Permet l'upload de scans haute résolution / PDFs (sinon nginx renvoie 413).
            client_max_body_size 50M;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
        }
    }
}