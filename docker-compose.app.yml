volumes:
  uploads_data:
  # Modèles de contrats/lettres édités via VaultTemplates (/app/VaultTemplates).
  # Volume nommé → survit à la recréation des conteneurs (sinon perdus).
  vault_templates_data:
  letsencrypt_data:
  qdrant_data:
  crowdsec_data:
  crowdsec_config:
  nginx_logs:
  # Cache du modèle d'embeddings e5-large (~2,2 Go), téléchargé au 1er démarrage de
  # rag-svc. Volume nommé → téléchargé UNE fois, conservé entre redémarrages/recréations.
  rag_models:
  # Blog SEO Ghost : contenu (images, thèmes, settings) + base MySQL dédiée.
  # Volumes nommés → survivent à la recréation des conteneurs.
  ghost_content:
  ghost_mysql_data:

networks:
  app-network:

services:
  # ── Bootstrap des certificats TLS ─────────────────────────────────────────
  # nginx refuse de démarrer si un `ssl_certificate` pointe vers un fichier absent.
  # Ce service one-shot crée, AVANT nginx, un certificat AUTO-SIGNÉ TEMPORAIRE pour
  # chaque domaine dont le vrai certificat Let's Encrypt n'existe pas encore. nginx
  # démarre alors normalement avec TOUS les blocs HTTPS actifs (y compris blog.),
  # et scripts/init-letsencrypt.sh remplace ensuite ces faux certs par les vrais.
  # Idempotent : si un vrai cert est déjà là, on n'y touche pas (aucun écrasement).
  # => Plus jamais besoin de commenter/décommenter le bloc SSL dans nginx.conf.
  init-certs:
    image: alpine:3
    volumes:
      - letsencrypt_data:/etc/letsencrypt
    entrypoint: ["/bin/sh", "-c"]
    # IMPORTANT : le script est UN SEUL élément de liste (`- |`), sinon compose
    # tokenise la chaîne en mots et `sh -c` n'exécute que le premier (« set »).
    command:
      - |
        set -e
        apk add --no-cache openssl >/dev/null
        for d in concorde-work-force.com blog.concorde-work-force.com; do
          if [ ! -f "/etc/letsencrypt/live/$$d/fullchain.pem" ]; then
            echo "init-certs: certificat auto-signé temporaire pour $$d"
            mkdir -p "/etc/letsencrypt/live/$$d"
            openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
              -keyout "/etc/letsencrypt/live/$$d/privkey.pem" \
              -out "/etc/letsencrypt/live/$$d/fullchain.pem" \
              -subj "/CN=$$d" >/dev/null 2>&1
          else
            echo "init-certs: certificat déjà présent pour $$d — rien à faire"
          fi
        done
    networks:
      - app-network

  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/app/uploads:ro
      - letsencrypt_data:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      # Attend que les certs (vrais ou temporaires) soient en place AVANT de démarrer,
      # sinon nginx crashe sur un ssl_certificate manquant.
      init-certs:
        condition: service_completed_successfully
      abrpoint.server:
        condition: service_started
      abrpoint.client:
        condition: service_started
    networks:
      - app-network

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: abrpoint.crowdsec
    environment:
      COLLECTIONS: "crowdsecurity/nginx crowdsecurity/http-cve crowdsecurity/base-http-scenarios"
      DISABLE_ONLINE_API: "true"
    volumes:
      - crowdsec_data:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
      - nginx_logs:/var/log/nginx:ro
    restart: unless-stopped
    networks:
      - app-network

  certbot:
    # Premier setup (émission initiale de TOUS les certs, à lancer une seule fois) :
    #   ./scripts/init-letsencrypt.sh
    # Le script pose des certs temporaires (via init-certs), émet les vrais en
    # --webroot, puis recharge nginx — sans jamais commenter le bloc SSL.
    # Ce service-ci ne gère QUE le renouvellement automatique (boucle 12h ci-dessous).
    image: certbot/certbot
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c"
    command: 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --deploy-hook "touch /etc/letsencrypt/.renewed"; sleep 12h & wait $${!}; done;'
    restart: unless-stopped
    networks:
      - app-network

  abrpoint.server:
    container_name: abrpoint.server
    image: mohamedbenrhaiem2003/abrpoint-server
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
      # Persiste les modèles de contrat/lettres édités (cf. note sur le volume).
      - vault_templates_data:/app/VaultTemplates
    environment:
      # ── Connexion Postgres distant (serveur DB séparé) ──────────────
      # Format Npgsql. Ssl Mode=Prefer : tente TLS si dispo, retombe en
      # clair sinon. Passer à "Require" + "Trust Server Certificate=true"
      # dès que le serveur Postgres distant aura un certificat (recommandé
      # pour toute liaison hors VPC privé / WireGuard).
      DB_HOST: "${DB_HOST:?DB_HOST manquant — IP ou DNS du serveur DB}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: "abrpoint_master"
      DB_USER: "${POSTGRES_USER:-abrpoint}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD manquant}"
      ConnectionStrings__MasterConnection: "Host=${DB_HOST};Port=${DB_PORT:-5432};Database=abrpoint_master;Username=${POSTGRES_USER:-abrpoint};Password=${POSTGRES_PASSWORD};Ssl Mode=Prefer;Trust Server Certificate=true;Pooling=true;Maximum Pool Size=100"
      ConnectionStrings__TenantTemplate: "Host=${DB_HOST};Port=${DB_PORT:-5432};Database={DbName};Username=${POSTGRES_USER:-abrpoint};Password=${POSTGRES_PASSWORD};Ssl Mode=Prefer;Trust Server Certificate=true;Pooling=true;Maximum Pool Size=100"
      ConnectionStrings__DefaultConnection: "Host=${DB_HOST};Port=${DB_PORT:-5432};Database=abrpoint_master;Username=${POSTGRES_USER:-abrpoint};Password=${POSTGRES_PASSWORD};Ssl Mode=Prefer;Trust Server Certificate=true"
      ConnectionStrings__FastReportConnection: "Host=${DB_HOST};Port=${DB_PORT:-5432};Database=abrpoint_master;Username=${POSTGRES_USER:-abrpoint};Password=${POSTGRES_PASSWORD};Ssl Mode=Prefer;Trust Server Certificate=true"
      Hosting__RootDomain: "concorde-work-force.com"
      ASPNETCORE_URLS: "http://+:8080"
      DatabaseInitialization__Enabled: "true"
      DatabaseInitialization__SocieteCode: "01"
      DatabaseInitialization__SocieteName: "Default Company"
      DatabaseInitialization__SiteCode: "01"
      DatabaseInitialization__SiteName: "Main Site"
      DatabaseInitialization__AdminCode: "AD"
      DatabaseInitialization__AdminFirstName: "Admin"
      DatabaseInitialization__AdminLastName: "System"
      DatabaseInitialization__AdminEmail: "admin@abrpoint.local"
      DatabaseInitialization__AdminPassword: "${ADMIN_BOOTSTRAP_PASSWORD:?Définir un mot de passe admin initial fort}"
      DatabaseInitialization__ApplicationCode: "GRH"
      OpenRouter__ApiKey: "${OPENROUTER_API_KEY:-}"
      Rag__Enabled: "true"
      Rag__Sidecar__BaseUrl: "http://rag-svc:8080"
      Rag__Sidecar__ApiKey: "${RAG_SIDECAR_KEY:-}"
      Rag__Anthropic__ApiKey: "${ANTHROPIC_API_KEY:-}"
      # Mode OpenRouter activé : /api/ChatRag/ask passe par OpenRouter Chat
      # Completions (compatible OpenAI) plutôt que par l'API Messages Anthropic
      # directe. Modèle ciblé : Gemini 2.0 Flash (cf. OpenRouterModel ci-dessous).
      # Pour revenir en mode Anthropic direct (recommandé RGPD si compte UE),
      # passer à "false" et renseigner ANTHROPIC_API_KEY.
      Rag__Anthropic__UseOpenRouter: "true"
      Rag__Anthropic__OpenRouterModel: "google/gemini-2.0-flash-001"
      Smtp__Host: "${SMTP_HOST:-ssl0.ovh.net}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__Username: "${SMTP_USERNAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__FromName: "${SMTP_FROM_NAME:-Concorde Work Force}"
      Smtp__FromEmail: "${SMTP_FROM_EMAIL:-}"
      Smtp__EnableSsl: "true"
      Download__ApkUrl: "${APK_URL:-https://expo.dev/accounts/concorde-tech-innovation/projects/concorde-workly/builds/eaa49a17-4adf-4cb6-bc59-47c473547136}"
      Download__ApkVersion: "${APK_VERSION:-1.0.0}"
      Download__ApkSizeMb: "${APK_SIZE_MB:-}"
      Download__ApkPublishedAt: "${APK_PUBLISHED_AT:-2026-05-15}"
      Jwt__Key: "${JWT_SECRET:?JWT_SECRET manquant (>= 32 chars aléatoires)}"
      Encryption__AesKey: "${AES_KEY:?AES_KEY manquant (16/24/32 chars)}"
      Stripe__SecretKey: "${STRIPE_SECRET_KEY:-}"
      Stripe__WebhookSecret: "${STRIPE_WEBHOOK_SECRET:-}"
      Gemini__ApiKey: "${GEMINI_API_KEY:-}"
    depends_on:
      # Plus de depends_on: abrpoint.database — la base est externe.
      rag-svc:
        condition: service_healthy
    networks:
      - app-network
    expose:
      - "8080"

  abrpoint.client:
    container_name: abrpoint.client
    image: mohamedbenrhaiem2003/abrpoint-client:latest
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - abrpoint.server
    networks:
      - app-network

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: abrpoint.qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"
      - "6334"
    networks:
      - app-network

  rag-svc:
    container_name: abrpoint.rag-svc
    image: mohamedbenrhaiem2003/abrpoint-rag-svc:latest
    restart: unless-stopped
    environment:
      QDRANT_URL: "http://qdrant:6333"
      EMBED_MODEL: "intfloat/multilingual-e5-large"
      EMBED_DEVICE: "cpu"
      SIDECAR_KEY: "${RAG_SIDECAR_KEY:-}"
      LOG_LEVEL: "INFO"
    depends_on:
      - qdrant
    expose:
      - "8080"
    volumes:
      # Cache du modèle e5-large : téléchargé au 1er démarrage, conservé ensuite.
      - rag_models:/models
    healthcheck:
      # Sain UNIQUEMENT quand le modèle e5-large est chargé en RAM : le handler /health
      # appelle get_embeddings(). On utilise python (curl absent de l'image slim).
      test: ["CMD", "python", "-c", "import urllib.request,json,sys; r=json.load(urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=30)); sys.exit(0 if r.get('model_loaded') else 1)"]
      interval: 30s
      timeout: 40s
      retries: 5
      # Large : couvre le téléchargement du modèle au 1er démarrage (~1-2 min) + le
      # chargement en RAM (~20 s). Pendant cette fenêtre, les échecs ne comptent pas.
      start_period: 300s
    networks:
      - app-network

  # ── Blog SEO Ghost ────────────────────────────────────────────────
  # Servi sur https://blog.concorde-work-force.com (sous-domaine dédié).
  # nginx-proxy termine le TLS et reverse-proxy vers ce conteneur (port 2368).
  # Pas de ports publiés : accessible uniquement via le réseau app-network.
  ghost-db:
    image: mysql:8.0
    container_name: abrpoint.ghost-db
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: "${GHOST_DB_ROOT_PASSWORD:?GHOST_DB_ROOT_PASSWORD manquant}"
      MYSQL_DATABASE: "ghost_prod"
      MYSQL_USER: "ghost"
      MYSQL_PASSWORD: "${GHOST_DB_PASSWORD:?GHOST_DB_PASSWORD manquant}"
    volumes:
      - ghost_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${GHOST_DB_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - app-network

  ghost:
    image: ghost:latest
    container_name: abrpoint.ghost
    restart: unless-stopped
    environment:
      # URL publique : DOIT correspondre au server_name nginx, sinon Ghost
      # génère des liens/redirections cassés (admin /ghost/, canonical SEO…).
      url: "https://blog.concorde-work-force.com"
      NODE_ENV: "production"
      database__client: "mysql"
      database__connection__host: "ghost-db"
      database__connection__port: "3306"
      database__connection__database: "ghost_prod"
      database__connection__user: "ghost"
      database__connection__password: "${GHOST_DB_PASSWORD:?GHOST_DB_PASSWORD manquant}"
      # E-mails membres / réinitialisation : réutilise le SMTP OVH de l'appli.
      mail__transport: "SMTP"
      mail__options__service: "${SMTP_HOST:-ssl0.ovh.net}"
      mail__options__host: "${SMTP_HOST:-ssl0.ovh.net}"
      mail__options__port: "${SMTP_PORT:-587}"
      mail__options__secure: "false"
      mail__options__auth__user: "${SMTP_USERNAME:-}"
      mail__options__auth__pass: "${SMTP_PASSWORD:-}"
      mail__from: "${SMTP_FROM_EMAIL:-}"
    volumes:
      - ghost_content:/var/lib/ghost/content
    depends_on:
      ghost-db:
        condition: service_healthy
    expose:
      - "2368"
    networks:
      - app-network
